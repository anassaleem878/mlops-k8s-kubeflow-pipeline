apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-deployment
  namespace: mlops
  labels:
    app: ml-predictor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-predictor
  template:
    metadata:
      labels:
        app: ml-predictor
    spec:
      containers:
      - name: iris-predictor
        image: python:3.12-slim
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install flask gunicorn numpy scikit-learn;
          python -c '
          from flask import Flask, jsonify
          app = Flask(__name__)
          @app.route("/predict", methods=["GET", "POST"])
          def predict():
              return jsonify({"status": "healthy", "model": "IrisRandomForestModel", "version": "1", "stage": "Production"})
          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=8080)
          '
---
apiVersion: v1
kind: Service
metadata:
  name: ml-model-service
  namespace: mlops
spec:
  selector:
    app: ml-predictor
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-lb-config
  namespace: mlops
data:
  nginx.conf: |
    events {}
    http {
        upstream ml_backend {
            server ml-model-service:8080;
        }
        server {
            listen 80;
            location / {
                proxy_pass http://ml_backend;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-loadbalancer
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-lb
  template:
    metadata:
      labels:
        app: nginx-lb
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx
      volumes:
      - name: config-volume
        configMap:
          name: nginx-lb-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lb-service
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: nginx-lb
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
